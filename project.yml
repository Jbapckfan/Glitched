name: Glitched
options:
  bundleIdPrefix: com.glitched
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  developmentLanguage: en

targets:
  Glitched:
    type: application
    platform: iOS
    sources:
      - path: Glitched
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Glitched/Assets/Assets.xcassets
      - path: Glitched/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glitched.app.jalford2026
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Glitched/Info.plist
        DEVELOPMENT_TEAM: "3KC59UY783"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Glitched/Glitched.entitlements
        ENABLE_PREVIEWS: YES
    info:
      path: Glitched/Info.plist
      properties:
        CFBundleName: Glitched
        CFBundleDisplayName: Glitched
        CFBundleIdentifier: com.glitched.app.jalford2026
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSMicrophoneUsageDescription: "Blow into the microphone to create wind in the game."
        NSSpeechRecognitionUsageDescription: "Speak words to solve puzzles."
        NSMotionUsageDescription: "Shake your device to rewind time in the game."
        NSFaceIDUsageDescription: "Authenticate to unlock the security vault puzzle."

  GlitchedTests:
    type: bundle.unit-test
    platform: iOS
    sources: GlitchedTests
    dependencies:
      - target: Glitched
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glitched.app.tests.jalford2026
        DEVELOPMENT_TEAM: "3KC59UY783"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
